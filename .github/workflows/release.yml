name: release

# タグ (v1.0.0 等) を push すると release APK をビルドし GitHub Releases に添付する。
# スマホのブラウザから直接 APK をダウンロード→インストールできる(手動転送不要)。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble release APK (signed)
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/GalaxyAlarm-${GITHUB_REF_NAME}.apk"

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
          body: |
            Galaxy アラーム ${{ github.ref_name }}

            スマホのブラウザでこのページを開き、下の `GalaxyAlarm-*.apk` をタップしてインストールしてください。
            初回は「提供元不明のアプリ」を許可する必要があります。
