name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, for example v1.8.5"
        required: true
        default: "v1.8.5"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Ensure app version matches tag
        shell: bash
        run: |
          VERSION_NAME="$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)"
          EXPECTED_TAG="v$VERSION_NAME"
          if [ "${{ steps.tag.outputs.name }}" != "$EXPECTED_TAG" ]; then
            echo "Tag ${{ steps.tag.outputs.name }} does not match app version $EXPECTED_TAG" >&2
            exit 1
          fi

      - name: Unit tests + assemble release APK
        run: ./gradlew testDebugUnitTest assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/GalaxyAlarm-${{ steps.tag.outputs.name }}.apk"

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Galaxy Clock ${{ steps.tag.outputs.name }}
          files: dist/*.apk
          generate_release_notes: true
          body: |
            Galaxy Clock ${{ steps.tag.outputs.name }}

            APK: GalaxyAlarm-${{ steps.tag.outputs.name }}.apk

            スマホのブラウザでこのページを開き、APKをダウンロードしてインストールしてください。

      - name: Verify published APK URL
        shell: bash
        run: |
          URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.name }}/GalaxyAlarm-${{ steps.tag.outputs.name }}.apk"
          for i in {1..12}; do
            status="$(curl -L -s -o /dev/null -w '%{http_code}' "$URL")"
            if [ "$status" = "200" ]; then
              echo "Verified $URL"
              exit 0
            fi
            echo "Waiting for APK asset ($status): $URL"
            sleep 10
          done
          echo "APK asset was not reachable: $URL" >&2
          exit 1
