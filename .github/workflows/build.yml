name: build

on:
  push:
    branches: [ "**" ]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Unit tests + assemble debug & release APK
        run: ./gradlew testDebugUnitTest assembleDebug assembleRelease --no-daemon --stacktrace

      - name: Determine app version
        id: version
        shell: bash
        run: |
          VERSION_NAME="$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)"
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk

      - name: Prepare release APK
        if: github.event_name == 'push'
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/GalaxyAlarm-${{ steps.version.outputs.tag }}.apk"

      - name: Publish to GitHub Releases
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Galaxy Alarm ${{ steps.version.outputs.tag }}
          files: dist/*.apk
          generate_release_notes: true
          body: |
            Galaxy Alarm ${{ steps.version.outputs.tag }}

            APK: GalaxyAlarm-${{ steps.version.outputs.tag }}.apk

            スマホのブラウザでこのページを開き、APKをダウンロードしてインストールしてください。
