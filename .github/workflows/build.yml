name: build

on:
  push:
    branches: [ "**" ]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Unit tests + assemble debug & release APK
        run: ./gradlew testDebugUnitTest assembleDebug assembleRelease --no-daemon --stacktrace

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk

      # push 時(PR以外)に署名済み release APK を GitHub Releases に自動公開する。
      # ワークフロー自身の GITHUB_TOKEN を使うため、タグ push なしでリリースできる。
      - name: Prepare release APK
        if: github.event_name == 'push'
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk dist/GalaxyAlarm-v1.0.0.apk

      - name: Publish to GitHub Releases
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: Galaxy アラーム v1.0.0
          files: dist/*.apk
          body: |
            Galaxy アラーム v1.0.0(自動ビルド)

            スマホのブラウザでこのページを開き、下の `GalaxyAlarm-v1.0.0.apk` をタップしてインストールしてください。
            初回は「提供元不明のアプリ」のインストール許可が必要です。
            インストール後、アプリ内「信頼性チェック」で「アラームとリマインダー」権限とバッテリー最適化除外を必ず設定してください。
